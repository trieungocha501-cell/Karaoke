<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYRICA - Voice Karaoke</title>
    <style>
        :root { --p: #bc13fe; --b: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--b); color: #fff; margin: 0; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #header { position: sticky; top: 0; background: rgba(5,5,5,0.9); padding: 20px; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
        h1 { font-size: clamp(2rem, 8vw, 3rem); text-transform: uppercase; letter-spacing: 10px; text-shadow: 0 0 10px var(--p); margin: 10px 0; font-weight: 900; cursor: pointer; }
        
        .filter-box { position: absolute; top: 25px; right: 20px; z-index: 101; }
        .filter-icon { font-size: 24px; cursor: pointer; color: var(--p); }
        .filter-menu { 
            display: none; position: absolute; top: 35px; right: 0; 
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px; 
            min-width: 200px; max-height: 300px; overflow-y: auto; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
        }
        .filter-menu div { padding: 12px 20px; font-size: 14px; cursor: pointer; text-align: left; border-bottom: 1px solid #252525; }
        .filter-menu div:hover { background: var(--p); color: #fff; }

        .search-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; margin: auto; padding: 0 15px; }
        .search-container { display: flex; align-items: center; background: #111; border-radius: 30px; border: 2px solid #333; padding: 5px 20px; flex-grow: 1; }
        input { border: none; background: transparent; color: #fff; padding: 12px; outline: none; flex-grow: 1; font-size: 16px; }
        .mic-btn { cursor: pointer; font-size: 20px; color: var(--p); padding: 5px; }
        .search-btn { padding: 12px 30px; cursor: pointer; background: var(--p); color: #fff; border: none; border-radius: 30px; font-weight: bold; min-height: 48px; }

        .section-label { text-align: left; max-width: 1200px; margin: 25px auto 5px; padding: 0 20px; color: var(--p); font-weight: bold; }

        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: #111; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #222; animation: fadeIn 0.5s ease forwards; transition: 0.3s; }
        .card:hover { border-color: var(--p); transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .card p { padding: 12px; font-size: 13px; margin: 0; height: 36px; overflow: hidden; line-height: 1.4; text-align: left; }

        #load-more { display: none; margin: 30px auto; background: transparent; color: var(--p); border: 2px solid var(--p); padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #player-container { width: 90%; height: 75%; }
        .close-btn { margin-top: 20px; background: #222; color: #fff; border: 1px solid #444; padding: 12px 40px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) { .search-btn { width: 100%; } #results { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="header">
    <div class="filter-box">
        <span class="filter-icon" onclick="toggleFilter()">⚙️</span>
        <div id="filter-menu" class="filter-menu">
            <div onclick="filterByAge('1-3')">👶 1 - 3 Tuổi</div>
            <div onclick="filterByAge('4-5')">🐥 4 - 5 Tuổi</div>
            <div onclick="filterByAge('6-8')">🎒 6 - 8 Tuổi</div>
            <div onclick="filterByAge('9-12')">🎮 9 - 12 Tuổi</div>
            <div onclick="filterByAge('13-15')">🎧 13 - 15 Tuổi</div>
            <div onclick="filterByAge('16-18')">🎓 16 - 18 Tuổi</div>
            <div onclick="filterByAge('18-24')">🔥 18 - 24 Tuổi</div>
            <div onclick="filterByAge('25-30')">💼 25 - 30 Tuổi</div>
            <div onclick="filterByAge('31-35')">🌟 31 - 35 Tuổi</div>
            <div onclick="filterByAge('35-40')">🎸 35 - 40 Tuổi</div>
            <div onclick="filterByAge('41-45')">🍷 41 - 45 Tuổi</div>
            <div onclick="filterByAge('46-50')">🏮 46 - 50 Tuổi</div>
        </div>
    </div>
    <h1 onclick="location.reload()">LYRICA</h1>
    <div class="search-wrapper">
        <div class="search-container">
            <span id="mic-icon" class="mic-btn" onclick="startVoice()">🎙️</span>
            <input type="text" id="q" placeholder="Hát gì hôm nay nhỉ?">
        </div>
        <button class="search-btn" onclick="searchMusic()">TÌM KIẾM</button>
    </div>
</div>

<div class="section-label" id="status-text">ĐANG THỊNH HÀNH</div>
<div id="results"></div>
<button id="load-more" onclick="searchMusic(true)">XEM THÊM</button>

<div id="overlay">
    <div id="player-container"></div>
    <button class="close-btn" onclick="closePlayer()">QUAY LẠI</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const KEY = 'AIzaSyD7Nbtw3hjr0aZsSujG3OnUAddQQNzrJwg';
    let player, nextToken = '', currentQuery = '';

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-container', { 
            height: '100%', width: '100%', videoId: '', 
            playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 } 
        });
        filterByAge('18-24');
    }

    function toggleFilter() {
        const m = document.getElementById('filter-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function filterByAge(range) {
        const k = { 
            '1-3':'nhạc mầm non','4-5':'thiếu nhi sôi động','6-8':'thiếu nhi tiểu học',
            '9-12':'nhạc trẻ em sôi động năng động','13-15':'nhạc tiktok hot','16-18':'nhạc trẻ trending',
            '18-24':'nhạc trẻ hot hiện nay','25-30':'ballad buồn','31-35':'làn sóng xanh',
            '35-40':'trữ tình hải ngoại','41-45':'bolero','46-50': 'nhạc trữ tình quê hương dân ca'
        }; // Thêm dấu đóng ngoặc ở đây nè chủ nhân!
        document.getElementById('q').value = "";
        searchMusic(false, `DÀNH CHO ĐỘ TUỔI ${range}`, k[range] + " karaoke");
        document.getElementById('filter-menu').style.display = 'none';
    }

    async function searchMusic(isMore = false, label = "KẾT QUẢ", autoQ = "") {
        if (!isMore) {
            currentQuery = (autoQ || document.getElementById('q').value || "karaoke");
            if (!currentQuery.includes("karaoke")) currentQuery += " karaoke";
            document.getElementById('results').innerHTML = '';
            nextToken = '';
            document.getElementById('status-text').innerText = label;
        }

        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${encodeURIComponent(currentQuery)}&type=video&videoCategoryId=10&pageToken=${nextToken}&key=${KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.items) {
                nextToken = data.nextPageToken || '';
                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => {
                        document.getElementById('overlay').style.display = 'flex';
                        player.loadVideoById(item.id.videoId);
                    };
                    card.innerHTML = `<img src="${item.snippet.thumbnails.medium.url}" onclick="playVideo('${item.id.videoId}')" style="width:100%; cursor:pointer; border-radius: 8px 8px 0 0;">
<div style="padding:10px; display:flex; justify-content:space-between; align-items:center; position:relative; background:#111; border-radius: 0 0 8px 8px;">
    <b style="flex:1; font-size:13px; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.snippet.title}</b>
    <span onclick="toggleActionMenu('${item.id.videoId}')" style="cursor:pointer; color:#bc13fe; font-size:22px; padding-left:10px; line-height:1;">⋮</span>
    <div id="menu-${item.id.videoId}" class="action-menu" style="display:none; position:absolute; bottom:45px; right:5px; background:#222; border:1px solid #bc13fe; padding:10px; border-radius:8px; z-index:100; min-width:140px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <div onclick="addToFav('${item.id.videoId}', '${item.snippet.title.replace(/'/g, "\\'")}', '${item.snippet.thumbnails.medium.url}')" style="cursor:pointer; padding:8px 0; font-size:12px; border-bottom:1px solid #333; color:white;">❤️ Lưu yêu thích</div>
<div onclick="blockVid('${item.id.videoId}')" style="cursor:pointer; padding:8px 0; font-size:12px; color:#ff4d4d; font-weight:bold;">🚫 Chặn bài này</div>
    </div>
</div>`;
                    document.getElementById('results').appendChild(card);
                });
                document.getElementById('load-more').style.display = nextToken ? 'block' : 'none';
            }
        } catch (e) { console.error("Lỗi:", e); }
    }

    function startVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Không hỗ trợ");
        const rec = new Speech();
        rec.lang = 'vi-VN';
        rec.start();
        rec.onresult = (e) => { 
            document.getElementById('q').value = e.results[0][0].transcript; 
            searchMusic(); 
        };
    }

    function closePlayer() { if(player) player.stopVideo(); document.getElementById('overlay').style.display = 'none'; }
    document.getElementById('q').addEventListener("keypress", (e) => { if(e.key === "Enter") searchMusic(); }
                                                 
                                                 
                                                 // ==========================================
// 1. QUẢN LÝ DANH SÁCH YÊU THÍCH
// ==========================================
function addToFav(id, title, img) {
    let favs = JSON.parse(localStorage.getItem('lyrica_favs') || '[]');
    if (!favs.find(f => f.id === id)) {
        favs.push({ id, title, img });
        localStorage.setItem('lyrica_favs', JSON.stringify(favs));
        alert("Đã thêm vào danh sách yêu thích của bạn. ✨");
    } else {
        alert("Bài hát này đã có trong danh sách rồi.");
    }
}

function showFavorites() {
    const favs = JSON.parse(localStorage.getItem('lyrica_favs') || '[]');
    const results = document.getElementById('results');
    results.innerHTML = '<h2 style="color:#bc13fe; text-align:center; width:100%; margin:20px 0;">🌟 DANH SÁCH YÊU THÍCH</h2>';
    if (favs.length === 0) { results.innerHTML += '<p style="text-align:center; width:100%;">Danh sách trống.</p>'; return; }
    
    favs.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${item.img}" onclick="playVideo('${item.id}')" style="width:100%; border-radius:8px; cursor:pointer;">
            <div style="padding:10px; color:white; font-size:12px; text-align:center;"><b>${item.title}</b></div>
            <button onclick="removeFav('${item.id}')" style="background:#ff4d4d; color:white; border:none; width:90%; padding:8px; margin:5px 5%; border-radius:5px; cursor:pointer;">❌ Bỏ yêu thích</button>
        `;
        results.appendChild(card);
    });
}

function removeFav(id) {
    let favs = JSON.parse(localStorage.getItem('lyrica_favs') || '[]');
    favs = favs.filter(f => f.id !== id);
    localStorage.setItem('lyrica_favs', JSON.stringify(favs));
    showFavorites();
}

// ==========================================
// 2. QUẢN LÝ DANH SÁCH CHẶN (LÃNH CUNG)
// ==========================================
function blockVid(id) {
    let list = JSON.parse(localStorage.getItem('lyrica_blacklist') || '[]');
    if(!list.includes(id)) {
        list.push(id);
        localStorage.setItem('lyrica_blacklist', JSON.stringify(list));
        alert("Đã thêm vào danh sách chặn.");
        location.reload(); 
    }
}

function showBlacklist() {
    const list = JSON.parse(localStorage.getItem('lyrica_blacklist') || '[]');
    const results = document.getElementById('results');
    results.innerHTML = '<h2 style="color:#ff4d4d; text-align:center; width:100%; margin:20px 0;">🚫 DANH SÁCH CHẶN</h2>';
    if (list.length === 0) { results.innerHTML += '<p style="text-align:center; width:100%;">Trống.</p>'; return; }
    
    list.forEach(id => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div style="padding:20px; color:white; text-align:center; background:#222; border-radius:8px; border:1px solid #444;">
                <p style="font-size:11px; margin-bottom:10px;">ID Video: ${id}</p>
                <button onclick="unblock('${id}')" style="background:#28a745; color:white; border:none; padding:8px 15px; border-radius:15px; cursor:pointer;">✅ Bỏ chặn</button>
            </div>
        `;
        results.appendChild(card);
    });
}

function unblock(id) {
    let list = JSON.parse(localStorage.getItem('lyrica_blacklist') || '[]');
    list = list.filter(i => i !== id);
    localStorage.setItem('lyrica_blacklist', JSON.stringify(list));
    showBlacklist();
}

// ==========================================
// 3. TRẮC NGHIỆM ĐỘ TUỔI TÂM HỒN (KHÔNG LỘ ĐIỂM)
// ==========================================
function showFAQ() {
    let score = 0;
    alert("Bắt đầu bài trắc nghiệm tâm hồn Lyrica (12 câu hỏi).\nNhập số từ 1 đến 4 để trả lời các lựa chọn.");

    const q = [
        "1. Thú vui khi rảnh?\n1. Chơi đồ chơi\n2. Xem hoạt hình\n3. Đi trà sữa\n4. Đọc báo/Tin tức",
        "2. Gu nhạc?\n1. Nhạc thiếu nhi\n2. Nhạc TikTok\n3. Nhạc buồn/Chill\n4. Nhạc xưa",
        "3. Khi bị mắng?\n1. Khóc nhè\n2. Dỗi\n3. Giải thích\n4. Im lặng suy ngẫm",
        "4. Đồ ăn yêu thích?\n1. Kẹo/Bánh\n2. Gà rán/Pizza\n3. Cơm gia đình\n4. Đồ bổ dưỡng",
        "5. Giờ đi ngủ?\n1. 8h tối\n2. 10h tối\n3. 12h đêm\n4. Ngủ sớm giữ sức khỏe",
        "6. Cách tiêu tiền?\n1. Mua kẹo\n2. Mua thẻ game\n3. Mua quần áo\n4. Tiết kiệm",
        "7. Phản ứng với trend mới?\n1. Không biết là gì\n2. Làm theo ngay\n3. Xem cho vui\n4. Thấy hơi phiền",
        "8. Kiểu bạn bè?\n1. Bạn cùng xóm\n2. Bạn cùng lớp\n3. Bạn thân chí cốt\n4. Đối tác/Đồng nghiệp",
        "9. Nơi muốn đi nhất?\n1. Công viên\n2. Rạp phim\n3. Quán cà phê\n4. Nơi yên tĩnh",
        "10. Cách dùng điện thoại?\n1. Xem YouTube Kids\n2. Chơi game\n3. Lướt mạng xã hội\n4. Check email/Công việc",
        "11. Thái độ với tình yêu?\n1. Là cái gì đó lạ lẫm\n2. Thích là nhích\n3. Chân thành, sâu đậm\n4. Cần sự ổn định",
        "12. Ước mơ?\n1. Làm siêu nhân\n2. Làm idol\n3. Có công việc tốt\n4. Bình yên, hạnh phúc"
    ];

    for (let i = 0; i < q.length; i++) {
        let ans = prompt(q[i]);
        score += (parseInt(ans) || 1);
    }

    let result = "";
    if (score <= 12) result = "1 đến 3 tuổi";
    else if (score <= 15) result = "4 đến 5 tuổi";
    else if (score <= 18) result = "6 đến 8 tuổi";
    else if (score <= 22) result = "9 đến 12 tuổi";
    else if (score <= 26) result = "13 đến 15 tuổi";
    else if (score <= 30) result = "16 đến 18 tuổi";
    else if (score <= 34) result = "18 đến 24 tuổi";
    else if (score <= 38) result = "25 đến 30 tuổi";
    else if (score <= 41) result = "31 đến 35 tuổi";
    else if (score <= 44) result = "35 đến 40 tuổi";
    else if (score <= 46) result = "41 đến 45 tuổi";
    else result = "46 đến 50 tuổi";

    alert("Kết quả: Độ tuổi tâm hồn của bạn là " + result + ".");
}

function toggleActionMenu(id) {
    const menu = document.getElementById('menu-' + id);
    document.querySelectorAll('.action-menu').forEach(m => { if(m.id !== 'menu-' + id) m.style.display = 'none'; });
    if(menu) menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
});
</script>
</body>
</html>
