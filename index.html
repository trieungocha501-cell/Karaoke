<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYRICA - Voice Karaoke</title>
    <style>
        :root { --p: #bc13fe; --b: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--b); color: #fff; margin: 0; text-align: center; }
        
        /* Hiệu ứng fadeIn mượt mà cho thẻ bài hát */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #header { position: sticky; top: 0; background: rgba(5,5,5,0.9); padding: 20px; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
        h1 { font-size: clamp(2rem, 8vw, 3rem); text-transform: uppercase; letter-spacing: 10px; text-shadow: 0 0 10px var(--p); margin: 10px 0; font-weight: 900; cursor: pointer; }
        
        /* Bộ lọc góc phải */
        .filter-box { position: absolute; top: 25px; right: 20px; z-index: 101; }
        .filter-icon { font-size: 24px; cursor: pointer; color: var(--p); transition: 0.3s; }
        .filter-menu { 
            display: none; position: absolute; top: 35px; right: 0; 
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px; 
            min-width: 200px; max-height: 300px; overflow-y: auto; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
        }
        .filter-menu::-webkit-scrollbar { width: 5px; }
        .filter-menu::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }
        .filter-menu div { padding: 12px 20px; font-size: 14px; cursor: pointer; text-align: left; border-bottom: 1px solid #252525; }
        .filter-menu div:hover { background: var(--p); color: #fff; }

        /* Khung tìm kiếm tối ưu mobile */
        .search-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; margin: auto; padding: 0 15px; }
        .search-container { display: flex; align-items: center; background: #111; border-radius: 30px; border: 2px solid #333; padding: 5px 20px; flex-grow: 1; transition: 0.3s; }
        .search-container:focus-within { border-color: var(--p); }
        input { border: none; background: transparent; color: #fff; padding: 12px; outline: none; flex-grow: 1; font-size: 16px; }
        .mic-btn { cursor: pointer; font-size: 20px; color: var(--p); padding: 5px; }
        .search-btn { padding: 12px 30px; cursor: pointer; background: var(--p); color: #fff; border: none; border-radius: 30px; font-weight: bold; min-height: 48px; }

        .section-label { text-align: left; max-width: 1200px; margin: 25px auto 5px; padding: 0 20px; color: var(--p); font-weight: bold; letter-spacing: 1px; }

        /* Lưới hiển thị bài hát */
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: #111; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #222; animation: fadeIn 0.5s ease forwards; transition: 0.3s; }
        .card:hover { border-color: var(--p); transform: translateY(-5px); }
        .card img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
        .card p { padding: 12px; font-size: 13px; margin: 0; height: 36px; overflow: hidden; line-height: 1.4; text-align: left; }

        /* Trình phát video */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #player-container { width: 90%; height: 75%; max-width: 1000px; }
        .close-btn { margin-top: 20px; background: #222; color: #fff; border: 1px solid #444; padding: 12px 40px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) { 
            .search-container { width: 100%; } 
            .search-btn { width: 100%; } 
            #results { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="header">
    <div class="filter-box">
        <span class="filter-icon" onclick="toggleFilter()">⚙️</span>
        <div id="filter-menu" class="filter-menu">
            <div onclick="filterByAge('1-3')">👶 1 - 3 Tuổi</div>
            <div onclick="filterByAge('4-5')">🐥 4 - 5 Tuổi</div>
            <div onclick="filterByAge('6-8')">🎒 6 - 8 Tuổi</div>
            <div onclick="filterByAge('9-12')">🎮 9 - 12 Tuổi</div>
            <div onclick="filterByAge('13-15')">🎧 13 - 15 Tuổi</div>
            <div onclick="filterByAge('16-18')">🎓 16 - 18 Tuổi</div>
            <div onclick="filterByAge('18-24')">🔥 18 - 24 Tuổi</div>
            <div onclick="filterByAge('25-30')">💼 25 - 30 Tuổi</div>
            <div onclick="filterByAge('31-35')">🌟 31 - 35 Tuổi</div>
            <div onclick="filterByAge('35-40')">🎸 35 - 40 Tuổi</div>
            <div onclick="filterByAge('41-45')">🍷 41 - 45 Tuổi</div>
            <div onclick="filterByAge('46-50')">🏮 46 - 50 Tuổi</div>
        </div>
    </div>
    <h1 onclick="location.reload()">LYRICA</h1>
    <div class="search-wrapper">
        <div class="search-container">
            <span id="mic-icon" class="mic-btn" onclick="startVoice()">🎙️</span>
            <input type="text" id="q" placeholder="Nói hoặc nhập tên bài hát...">
        </div>
        <button class="search-btn" onclick="searchMusic()">TÌM KIẾM</button>
    </div>
</div>

<div class="section-label" id="status-text">ĐANG THỊNH HÀNH</div>
<div id="results"></div>

<div id="overlay">
    <div id="player-container"></div>
    <button class="close-btn" onclick="closePlayer()">QUAY LẠI</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const KEY = 'AIzaSyD7Nbtw3hjr0aZsSujG3OnUAddQQNzrJwg';
    let player;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-container', {
            height: '100%', width: '100%', videoId: '',
            playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 }
        });
        // Mặc định hiện nhạc hot cho lứa tuổi phổ biến nhất
        filterByAge('18-24');
    }

    function toggleFilter() {
        const menu = document.getElementById('filter-menu');
        menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    }

    function filterByAge(range) {
        const keywords = {
            '1-3': 'nhạc mầm non karaoke',
            '4-5': 'nhạc thiếu nhi sôi động karaoke',
            '6-8': 'nhạc thiếu nhi tiểu học karaoke',
            '9-12': 'nhạc tuổi thần tiên lớp 5 karaoke',
            '13-15': 'nhạc tiktok hot karaoke',
            '16-18': 'nhạc trẻ trending karaoke',
            '18-24': 'nhạc trẻ hot hiện nay karaoke',
            '25-30': 'nhạc trẻ ballad buồn karaoke',
            '31-35': 'nhạc làn sóng xanh karaoke',
            '35-40': 'nhạc trữ tình hải ngoại karaoke',
            '41-45': 'nhạc vàng bolero karaoke',
            '46-50': 'nhạc trữ tình quê hương karaoke'
        };
        
        document.getElementById('q').value = ""; 
        searchMusic(false, `DÀNH CHO ĐỘ TUỔI ${range}`, keywords[range]);
        document.getElementById('filter-menu').style.display = 'none';
    }

    async function searchMusic(isMore = false, label = "KẾT QUẢ TÌM KIẾM", autoQ = "") {
        const query = autoQ || document.getElementById('q').value || "karaoke";
        document.getElementById('status-text').innerText = label;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '';

        const finalQ = query.includes("karaoke") ? query : query + " karaoke";
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${encodeURIComponent(finalQ)}&type=video&videoCategoryId=10&key=${KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.items) {
                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => {
                        document.getElementById('overlay').style.display = 'flex';
                        player.loadVideoById(item.id.videoId);
                    };
                    card.innerHTML = `<img src="${item.snippet.thumbnails.medium.url}"><p>${item.snippet.title}</p>`;
                    resDiv.appendChild(card);
                });
            }
        } catch (e) { console.error("Lỗi API YouTube"); }
    }

    function startVoice() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) return alert("Trình duyệt không hỗ trợ giọng nói!");
        const rec = new SpeechRec();
        rec.lang = 'vi-VN';
        rec.start();
        rec.onstart = () => { document.getElementById('mic-icon').style.color = 'red'; };
        rec.onresult = (e) => {
            document.getElementById('q').value = e.results[0][0].transcript;
            searchMusic();
        };
        rec.onend = () => { document.getElementById('mic-icon').style.color = 'var(--p)'; };
    }

    function closePlayer() {
        if (player) player.stopVideo();
        document.getElementById('overlay').style.display = 'none';
    }

    document.getElementById('q').addEventListener("keypress", (e) => { if(e.key === "Enter") searchMusic(); });
</script>
</body>
</html>
